<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Novo Ticket</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; }
        header { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 18px; font-weight: 600; color: #ffffff; }
        .container { max-width: 600px; margin: 40px auto; padding: 0 32px; }
        h2 { font-size: 16px; font-weight: 600; margin-bottom: 24px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, textarea, select { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 10px 14px; color: #e0e0e0; font-size: 13px; font-family: inherit; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #2563eb; }
        textarea { height: 100px; resize: vertical; }
        select option { background: #1a1a1a; }
        .btn { padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; text-decoration: none; display: inline-block; margin-right: 8px; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-secondary { background: #2a2a2a; color: #aaa; }
        a { color: #60a5fa; text-decoration: none; }
    </style>
</head>
<body>
<header>
    <h1>HelderLab - Sistema de Tickets Help Desk</h1>
    <a href="/" style="color:#666; font-size:13px;">Voltar ao painel</a>
</header>
<div class="container">
    <h2>Abrir Novo Ticket</h2>
    <form method="POST">
        <div class="form-group">
            <label>Titulo</label>
            <input type="text" name="titulo" required placeholder="Descricao breve do problema">
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <select name="categoria" required>
                <option value="">Selecionar categoria</option>
                <option value="rede">Rede</option>
                <option value="hardware">Hardware</option>
                <option value="software">Software</option>
                <option value="acesso">Acesso</option>
                <option value="impressora">Impressora</option>
            </select>
        </div>
        <div class="form-group">
            <label>Descricao</label>
            <textarea name="descricao" required placeholder="Descreve o problema em detalhe"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Criar Ticket</button>
        <a href="/" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
